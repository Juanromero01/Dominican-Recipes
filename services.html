<h1>Sancocho</h1>

<h2>Ingredients</h2>
<ul>
    <li>Chicken or beef</li>
    <li>Yuca</li>
    <li>Plantains</li>
    <li>Corn</li>
    <li>Garlic, onion, cilantro</li>
</ul>

<h2>Instructions</h2>
<ol>
    <li>Boil meat with seasoning for 30 minutes.</li>
    <li>Add yuca, plantains, and corn.</li>
    <li>Cook for 1–2 hours until soft.</li>
    <li>Add cilantro and serve hot.</li>
</ol>
