<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage Calculator</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="page">

  <aside class="sidebar">
    <div class="sidebar-inner">

      <h1 class="site-title">
        Mortgage<br>Calculator
      </h1>

      <p class="site-subtitle">
        Home Loan Estimator
      </p>

      <nav class="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="services.html" class="nav-link">Services</a>
        <a href="mortgage.html" class="nav-link">Mortgage</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </nav>

    </div>
  </aside>

  <main class="content">

    <header class="hero">
      <p class="hero-tagline">Easy Mortgage Tool</p>

      <h2 class="hero-title">
        Mortgage Calculator
      </h2>

      <p class="hero-description">
        Calculate your monthly mortgage payment.
      </p>
    </header>

    <section class="section">

      <div class="calculator-box">

        <label>Loan Amount ($)</label>
        <input type="number" id="loanAmount">

        <label>Interest Rate (%)</label>
        <input type="number" id="interestRate">

        <label>Loan Term (Years)</label>
        <input type="number" id="loanYears">

        <button onclick="calculateMortgage()">
          Calculate Mortgage
        </button>

        <div class="result-box">
          <h3>Monthly Payment</h3>

          <p id="monthlyPayment">
            $0.00
          </p>
        </div>

      </div>

    </section>

  </main>

</div>

<script src="mortgage.js"></script>

</body>
</html>
